name: Build Android AAB

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run expo prebuild (generate native android project)
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Decode keystore
        working-directory: android/app
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > release.keystore

      - name: Configure Gradle signing
        working-directory: android
        run: |
          cat >> gradle.properties << EOF
          MYAPP_RELEASE_STORE_FILE=release.keystore
          MYAPP_RELEASE_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}
          MYAPP_RELEASE_STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          MYAPP_RELEASE_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Patch app/build.gradle to use release signing config
        working-directory: android
        run: |
          python3 - << 'PYEOF'
          import re

          path = "app/build.gradle"
          with open(path) as f:
              content = f.read()

          signing_block = '''    signingConfigs {
              release {
                  if (project.hasProperty('MYAPP_RELEASE_STORE_FILE')) {
                      storeFile file(MYAPP_RELEASE_STORE_FILE)
                      storePassword MYAPP_RELEASE_STORE_PASSWORD
                      keyAlias MYAPP_RELEASE_KEY_ALIAS
                      keyPassword MYAPP_RELEASE_KEY_PASSWORD
                  }
              }
          }
          '''

          if "signingConfigs {" not in content:
              content = re.sub(
                  r'(android \{\n)',
                  r'\1' + signing_block,
                  content,
                  count=1
              )

          content = re.sub(
              r'(buildTypes \{\s*release \{\s*)(?!.*signingConfig)',
              r'\1signingConfig signingConfigs.release\n            ',
              content,
              count=1,
              flags=re.DOTALL
          )

          with open(path, "w") as f:
              f.write(content)
          PYEOF

      - name: Grant execute permission for gradlew
        working-directory: android
        run: chmod +x gradlew

      - name: Build release AAB
        working-directory: android
        run: ./gradlew bundleRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: smart-file-toolbox-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Clean up keystore
        if: always()
        working-directory: android/app
        run: rm -f release.keystore
